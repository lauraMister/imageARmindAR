<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Planet AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #startOverlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.78);
      }

      #startButton {
        border: 0;
        padding: 14px 20px;
        font-size: 16px;
        border-radius: 12px;
        cursor: pointer;
      }

      #hint {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 15;
        color: white;
        background: rgba(0,0,0,0.58);
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        text-align: center;
        max-width: 90vw;
      }
    </style>
  </head>

  <body>
    <div id="startOverlay">
      <button id="startButton">Avvia AR</button>
    </div>

    <div id="hint">Premi “Avvia AR”, consenti la camera, poi inquadra planet.jpg</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes; uiLoading: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <video
          id="planetVideo"
          src="./planet.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="planetTarget" mindar-image-target="targetIndex: 0">
        <a-video
          src="#planetVideo"
          width="1"
          height="0.5625"
          position="0 0 0.01"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.getElementById("startButton");
      const startOverlay = document.getElementById("startOverlay");
      const hint = document.getElementById("hint");
      const sceneEl = document.querySelector("a-scene");
      const targetEl = document.getElementById("planetTarget");
      const videoEl = document.getElementById("planetVideo");

      const arSystem = () => sceneEl.systems["mindar-image-system"];

      videoEl.addEventListener("loadedmetadata", () => {
        console.log("Video caricato");
      });

      videoEl.addEventListener("error", () => {
        console.error("Errore video:", videoEl.error);
        hint.textContent = "Il file planet.mp4 non viene letto correttamente dal browser.";
      });

      sceneEl.addEventListener("arReady", () => {
        console.log("AR pronta");
        hint.textContent = "AR attiva. Ora inquadra planet.jpg";
      });

      sceneEl.addEventListener("arError", () => {
        console.error("MindAR non è partita");
        hint.textContent = "AR non partita. Verifica permesso camera, HTTPS e browser compatibile.";
      });

      targetEl.addEventListener("targetFound", async () => {
        console.log("Target trovato");
        hint.textContent = "Target trovato";
        try {
          await videoEl.play();
        } catch (e) {
          console.error("Play video fallito:", e);
          hint.textContent = "Target trovato, ma il video non parte.";
        }
      });

      targetEl.addEventListener("targetLost", () => {
        console.log("Target perso");
        videoEl.pause();
        videoEl.currentTime = 0;
        hint.textContent = "Target perso. Reinquadra planet.jpg";
      });

      startButton.addEventListener("click", async () => {
        startButton.disabled = true;
        hint.textContent = "Avvio AR in corso...";

        // Prova a “sbloccare” il video, ma senza bloccare l’AR se fallisce
        try {
          videoEl.muted = true;
          await videoEl.play();
          videoEl.pause();
          videoEl.currentTime = 0;
          console.log("Video sbloccato");
        } catch (e) {
          console.warn("Pre-play video fallito, continuo comunque con AR:", e);
        }

        try {
          await arSystem().start();
          startOverlay.style.display = "none";
        } catch (e) {
          console.error("Errore start AR:", e);
          hint.textContent = "Errore start AR. Apri la console del browser per il dettaglio.";
          startButton.disabled = false;
        }
      });
    </script>
  </body>
</html>

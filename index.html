<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Planet AR Test</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }
      #ui {
        position: fixed;
        inset: 0;
        z-index: 30;
        pointer-events: none;
      }
      #panel {
        position: absolute;
        top: 16px;
        left: 16px;
        right: 16px;
        background: rgba(0,0,0,.72);
        color: #fff;
        padding: 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.4;
      }
      #startButton {
        pointer-events: auto;
        margin-top: 10px;
        border: 0;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
      }
      #log {
        white-space: pre-wrap;
        margin-top: 10px;
        font-family: monospace;
        font-size: 12px;
      }
      #assetLinks {
        margin-top: 10px;
      }
      #assetLinks a {
        color: #9ad1ff;
        pointer-events: auto;
        margin-right: 12px;
      }
    </style>
  </head>

  <body>
    <div id="ui">
      <div id="panel">
        <div><strong>Test MindAR</strong></div>
        <div id="status">Stato: pagina caricata</div>
        <button id="startButton">Avvia AR</button>
        <div id="assetLinks">
          <a href="./targets.mind" target="_blank" rel="noopener">Apri targets.mind</a>
          <a href="./planet.jpg" target="_blank" rel="noopener">Apri planet.jpg</a>
          <a href="./planet.mp4" target="_blank" rel="noopener">Apri planet.mp4</a>
        </div>
        <div id="log"></div>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes; uiLoading: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="planetTarget" mindar-image-target="targetIndex: 0">
        <a-plane
          color="red"
          width="1"
          height="0.6"
          position="0 0 0"
        ></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const startButton = document.getElementById("startButton");
      const sceneEl = document.querySelector("a-scene");
      const targetEl = document.getElementById("planetTarget");

      function log(msg) {
        console.log(msg);
        logEl.textContent += msg + "\n";
      }

      function setStatus(msg) {
        statusEl.textContent = "Stato: " + msg;
        log(msg);
      }

      window.addEventListener("error", (e) => {
        setStatus("errore JS: " + e.message);
      });

      document.addEventListener("DOMContentLoaded", () => {
        setStatus("DOM pronto");
      });

      sceneEl.addEventListener("loaded", () => {
        setStatus("A-Frame caricato");
      });

      sceneEl.addEventListener("arReady", () => {
        setStatus("AR pronta: ora inquadra planet.jpg");
      });

      sceneEl.addEventListener("arError", () => {
        setStatus("AR error: camera o targets.mind non accessibili");
      });

      targetEl.addEventListener("targetFound", () => {
        setStatus("TARGET TROVATO");
      });

      targetEl.addEventListener("targetLost", () => {
        setStatus("target perso");
      });

      startButton.addEventListener("click", async () => {
        try {
          setStatus("richiesta avvio AR...");
          const arSystem = sceneEl.systems["mindar-image-system"];
          if (!arSystem) {
            setStatus("mindar-image-system non trovato");
            return;
          }
          await arSystem.start();
          setStatus("start() eseguito, attendo arReady...");
        } catch (err) {
          setStatus("start() fallito: " + (err?.message || err));
        }
      });
    </script>
  </body>
</html>

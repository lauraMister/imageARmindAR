<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Planet AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      #status {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 20;
        color: white;
        background: rgba(0,0,0,0.6);
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        text-align: center;
        max-width: 90vw;
      }

      #unlock {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.75);
      }

      #unlock button {
        border: 0;
        padding: 14px 20px;
        font-size: 16px;
        border-radius: 12px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="unlock">
      <button id="unlockButton">Abilita video</button>
    </div>

    <div id="status">Consenti la camera. Poi inquadra planet.jpg</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes; uiLoading: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <video
          id="planetVideo"
          src="./planet.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="planetTarget" mindar-image-target="targetIndex: 0">
        <a-video
          src="#planetVideo"
          width="1"
          height="0.5625"
          position="0 0 0.01"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const statusEl = document.getElementById("status");
      const unlockEl = document.getElementById("unlock");
      const unlockButton = document.getElementById("unlockButton");
      const sceneEl = document.querySelector("a-scene");
      const targetEl = document.getElementById("planetTarget");
      const videoEl = document.getElementById("planetVideo");

      let videoUnlocked = false;

      function setStatus(text) {
        statusEl.textContent = text;
        console.log(text);
      }

      unlockButton.addEventListener("click", async () => {
        try {
          await videoEl.play();
          videoEl.pause();
          videoEl.currentTime = 0;
          videoUnlocked = true;
          unlockEl.style.display = "none";
          setStatus("Video abilitato. Ora inquadra planet.jpg");
        } catch (e) {
          console.error(e);
          setStatus("Non riesco ad abilitare il video. Riprova toccando il pulsante.");
        }
      });

      sceneEl.addEventListener("loaded", () => {
        setStatus("Scena caricata. Attendi la camera...");
      });

      sceneEl.addEventListener("arReady", () => {
        setStatus("AR pronta. Inquadra planet.jpg");
      });

      sceneEl.addEventListener("arError", () => {
        setStatus("Errore AR: controlla permesso camera e browser.");
      });

      targetEl.addEventListener("targetFound", async () => {
        setStatus("Target trovato");
        try {
          if (!videoUnlocked) {
            setStatus("Target trovato. Tocca prima 'Abilita video'.");
            return;
          }
          await videoEl.play();
        } catch (e) {
          console.error(e);
          setStatus("Il target è trovato, ma il video non parte.");
        }
      });

      targetEl.addEventListener("targetLost", () => {
        videoEl.pause();
        videoEl.currentTime = 0;
        setStatus("Target perso. Reinquadra planet.jpg");
      });

      videoEl.addEventListener("error", () => {
        console.error("Errore video:", videoEl.error);
        setStatus("Errore nel file planet.mp4");
      });

      window.addEventListener("error", (e) => {
        console.error("JS error:", e.message);
      });
    </script>
  </body>
</html>

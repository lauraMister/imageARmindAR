<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Planet Project - MindAR Version</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
    #loader {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      gap: 16px; color: white;
    }
    #loader .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { font-size: 15px; letter-spacing: 0.05em; opacity: 0.85; }
    #badge {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      color: white; font-size: 12px; letter-spacing: 0.08em;
      padding: 6px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }
    #badge span { color: #7dd3fc; font-weight: 700; }
    #hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.75); font-size: 13px; padding: 8px 20px;
      border-radius: 999px; border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap; pointer-events: none; transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <p>Caricamento tracciamento planetario...</p>
  </div>
  <div id="badge">Libreria: <span>MindAR + Three.js</span></div>
  <div id="hint">📷 Punta la fotocamera sul marker del pianeta</div>
  
  <video id="planet-video" src="planet.mp4"
    loop muted playsinline webkit-playsinline crossorigin="anonymous"
    style="display:none;"></video>
  
  <!-- Carica Three.js PRIMA di MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  
  <!-- MindAR Image Tracking con Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
  
  <script>
    // Verifica che le librerie siano caricate
    if (typeof THREE === 'undefined') {
      document.getElementById("loader").innerHTML =
        "<p style='color:#f87171;text-align:center;padding:24px;'>Errore: Three.js non caricato</p>";
      throw new Error("Three.js non disponibile");
    }
    
    if (typeof window.MINDAR === 'undefined') {
      document.getElementById("loader").innerHTML =
        "<p style='color:#f87171;text-align:center;padding:24px;'>Errore: MindAR non caricato<br>Controlla la connessione internet</p>";
      throw new Error("MindAR non disponibile");
    }

    console.log("✅ Three.js caricato:", THREE.REVISION);
    console.log("✅ MindAR caricato:", window.MINDAR);

    // Attiva audio/video al primo click (richiesto dai browser moderni)
    document.addEventListener("click", () => {
      document.getElementById("planet-video").play().catch(() => {});
    }, { once: true });

    // Inizializza MindAR
    const mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: document.body,
      imageTargetSrc: "./targets.mind",
    });

    const { renderer, scene, camera } = mindarThree;
    const video = document.getElementById("planet-video");
    
    // Crea texture video
    const videoTexture = new THREE.VideoTexture(video);
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;

    // Proporzione 16:9 (width=1, height=0.5625)
    const geometry = new THREE.PlaneGeometry(1, 0.5625);
    const material = new THREE.MeshBasicMaterial({ 
      map: videoTexture, 
      side: THREE.DoubleSide 
    });
    const plane = new THREE.Mesh(geometry, material);

    // Aggiungi il video all'anchor (marker rilevato)
    const anchor = mindarThree.addAnchor(0);
    anchor.group.add(plane);

    // Gestisci eventi di rilevamento
    anchor.onTargetFound = () => {
      console.log("🎯 Marker rilevato!");
      video.play().catch(() => {});
      document.getElementById("hint").style.opacity = "0";
    };

    anchor.onTargetLost = () => {
      console.log("❌ Marker perso");
      video.pause();
      document.getElementById("hint").style.opacity = "1";
    };

    // Avvia MindAR
    console.log("🚀 Avvio MindAR...");
    mindarThree.start()
      .then(() => {
        console.log("✅ MindAR avviato con successo");
        document.getElementById("loader").style.display = "none";
        renderer.setAnimationLoop(() => renderer.render(scene, camera));
      })
      .catch(err => {
        console.error("❌ Errore MindAR:", err);
        document.getElementById("loader").innerHTML =
          "<p style='color:#f87171;text-align:center;padding:24px;'>Errore avvio fotocamera o caricamento marker.<br>Verifica i permessi e che targets.mind sia presente.</p>";
      });
  </script>
</body>
</html>

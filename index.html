<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Planet AR</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      a-scene {
        position: fixed;
        inset: 0;
      }

      #hud {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 16px;
        pointer-events: none;
      }

      #status {
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        text-align: center;
        max-width: 92vw;
      }

      #unlockButton {
        pointer-events: auto;
        border: 0;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 15px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="hud">
      <div id="status">Consenti la camera. Se la camera si apre, vedrai subito l’ambiente reale dietro questa scritta.</div>
      <button id="unlockButton">Abilita video planet.mp4</button>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights, alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="planetVideo"
          src="./planet.mp4"
          preload="auto"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="planetTarget" mindar-image-target="targetIndex: 0">
        <a-video
          src="#planetVideo"
          width="1"
          height="0.5625"
          position="0 0 0.01"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const statusEl = document.getElementById("status");
      const unlockButton = document.getElementById("unlockButton");
      const sceneEl = document.querySelector("a-scene");
      const targetEl = document.getElementById("planetTarget");
      const videoEl = document.getElementById("planetVideo");

      let videoUnlocked = false;

      function setStatus(text) {
        statusEl.textContent = text;
        console.log(text);
      }

      unlockButton.addEventListener("click", async () => {
        try {
          await videoEl.play();
          videoEl.pause();
          videoEl.currentTime = 0;
          videoUnlocked = true;
          setStatus("Video sbloccato. Ora inquadra planet.jpg");
        } catch (e) {
          console.error(e);
          setStatus("Non riesco a sbloccare il video. Riprova a toccare il pulsante.");
        }
      });

      sceneEl.addEventListener("loaded", () => {
        setStatus("Scena caricata. Attendo avvio camera...");
      });

      sceneEl.addEventListener("arReady", () => {
        setStatus("AR pronta. Se tutto è ok, adesso devi vedere la camera dal vivo dietro questa barra.");
      });

      sceneEl.addEventListener("arError", () => {
        setStatus("Errore AR. Controlla permesso camera del browser.");
      });

      targetEl.addEventListener("targetFound", async () => {
        if (!videoUnlocked) {
          setStatus("Target trovato. Tocca 'Abilita video planet.mp4' per far partire il video.");
          return;
        }
        try {
          await videoEl.play();
          setStatus("Target trovato: video in riproduzione.");
        } catch (e) {
          console.error(e);
          setStatus("Target trovato, ma il video non parte.");
        }
      });

      targetEl.addEventListener("targetLost", () => {
        videoEl.pause();
        videoEl.currentTime = 0;
        setStatus("Target perso. Reinquadra planet.jpg");
      });

      videoEl.addEventListener("error", () => {
        console.error(videoEl.error);
        setStatus("planet.mp4 non viene letto correttamente dal browser.");
      });

      window.addEventListener("error", (e) => {
        console.error("JS error:", e.message);
        setStatus("Errore JS: " + e.message);
      });
    </script>
  </body>
</html>
